name: Backfill fund NAV history

on:
  workflow_dispatch:
    inputs:
      start:
        description: '시작일 (YYYY-MM-DD)'
        required: true
        default: '2018-01-01'
      end:
        description: '종료일 (YYYY-MM-DD, 비우면 오늘)'
        required: false
        default: ''
      chunk_years:
        description: '청크 분할 (년 단위, 0=쪼개지 않음)'
        required: false
        default: '0'

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run backfill
        run: |
          END_ARG=""
          if [ -n "${{ inputs.end }}" ]; then
            END_ARG="--end ${{ inputs.end }}"
          fi
          python -m src.backfill \
            --start "${{ inputs.start }}" \
            --chunk-years "${{ inputs.chunk_years }}" \
            $END_ARG

      - name: Commit & push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            MSG="data: backfill ${{ inputs.start }} ~ ${{ inputs.end || 'today' }}"
            git commit -m "$MSG"
            git push
          fi
