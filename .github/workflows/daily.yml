name: Daily fund NAV fetch

on:
  schedule:
    # UTC 23:00 = KST 08:00, 평일만 (Mon-Fri)
    - cron: '0 23 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: fund-scraper-daily
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Fetch latest NAVs
        run: python -m src.daily

      - name: Fetch benchmark data
        run: python -m src.benchmarks

      - name: Build dashboard
        run: python -m src.dashboard --output _site/index.html

      - name: Commit data changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: $(date -u +%Y-%m-%d) NAV update"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: fetch
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
